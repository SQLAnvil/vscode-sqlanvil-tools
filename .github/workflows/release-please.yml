name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Force-publish the npm package at its current manifest version"
        type: boolean
        default: false
      publish_pypi:
        description: "Force-publish the PyPI package at its current manifest version"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      npm_released: ${{ steps.release.outputs['packages/npm--release_created'] }}
      pypi_released: ${{ steps.release.outputs['packages/pypi--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: |
      needs.release-please.outputs.npm_released == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_npm)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (>=11.5.1 required for Trusted Publishing)
        run: npm install -g npm@latest
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public

  publish-pypi:
    needs: release-please
    if: |
      needs.release-please.outputs.pypi_released == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_pypi)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/pypi
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/dist
